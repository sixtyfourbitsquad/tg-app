services:
  # ── Next.js App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/nfws_db
      REDIS_URL: redis://redis:6379
      # Container-local path where the host's video library is mounted.
      # MUST be outside /app/public otherwise Next's static file handler
      # claims /videos/* and 404s before our route handler runs. The build
      # stage of the Dockerfile bakes this same value into the compiled
      # server bundle, so change both together.
      VIDEOS_DIR: /app/videos-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
      - app_logs:/app/logs
      # Host videos directory (from HOST_VIDEOS_DIR, default /home/adii/videos)
      # mounted read-only inside the container at /app/videos-data.
      #
      # NOTE: do NOT reuse VIDEOS_DIR for this host path. That variable
      # describes the *container-internal* location and is inlined into the
      # server bundle at build time; reusing it here caused compose to
      # substitute the in-container path onto the host side and silently
      # mount an empty directory.
      - ${HOST_VIDEOS_DIR:-/home/adii/videos}:/app/videos-data:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nfws

  # ── PostgreSQL 15 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfws_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nfws_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nfws

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nfws

volumes:
  postgres_data:
  redis_data:
  app_logs:

networks:
  nfws:
    driver: bridge
